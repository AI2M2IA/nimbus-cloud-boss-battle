name: Pages

# Export the Web (HTML5) build and publish it to GitHub Pages.
# Requires repo Settings -> Pages -> Source = "GitHub Actions".
# The Web preset is single-threaded (thread_support disabled) so the build
# runs on Pages without the COOP/COEP headers Godot's threaded build needs.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Export Web and deploy to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      GODOT_VERSION: "4.6.3"
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }} + export templates
        run: |
          set -euo pipefail
          base="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fL -o godot.zip "${base}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q -o godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot && chmod +x godot
          curl -fL -o templates.tpz "${base}/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q -o templates.tpz -d _tpl
          dest="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$dest"
          mv _tpl/templates/* "$dest/"

      - name: Write Web export preset
        run: |
          cat > export_presets.cfg <<'CFG'
          [preset.0]
          name="Web"
          platform="Web"
          runnable=true
          export_path="build/web/index.html"

          [preset.0.options]
          variant/thread_support=false
          html/export_icon=true
          CFG

      - name: Export Web build
        run: |
          set -euo pipefail
          mkdir -p build/web
          ./godot --headless --path . --import || true
          ./godot --headless --path . --export-release "Web" build/web/index.html
          ls -la build/web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
