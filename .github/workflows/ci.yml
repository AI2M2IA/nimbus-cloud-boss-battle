name: CI

# Deterministic merge gate: enforce the pseudonymous Identity Policy on every
# commit, then run the static release-surface audit (identity and path-leak
# checks on file contents) and the headless unit/integration suite. This is
# the check that should be required on pull requests into develop and main.

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Identity + static audit + headless tests
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.6.3"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce commit identity (pseudonym only)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA:-}" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-list --max-parents=0 "$HEAD_SHA" | tail -1)"
          fi
          bash scripts/dev/check_commit_identity.sh "${BASE_SHA}..${HEAD_SHA}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache Godot ${{ env.GODOT_VERSION }}
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-${{ env.GODOT_VERSION }}-linux-headless

      - name: Download Godot ${{ env.GODOT_VERSION }} (headless)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/godot && cd ~/godot
          base="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fL -o godot.zip "${base}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -o godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot

      - name: Import assets
        run: |
          "$HOME/godot/godot" --headless --path . --import || true

      - name: Static audit + test suite
        run: |
          GODOT="$HOME/godot/godot" ./run-tests.sh
