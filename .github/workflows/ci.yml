name: CI

# Deterministic merge gate: the static release-surface audit (identity and
# path-leak checks) plus the headless unit/integration suite. This is the
# check that should be required on pull requests into develop and main.

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Static audit + headless tests
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.6.3"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache Godot ${{ env.GODOT_VERSION }}
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-${{ env.GODOT_VERSION }}-linux-headless

      - name: Download Godot ${{ env.GODOT_VERSION }} (headless)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/godot && cd ~/godot
          base="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fL -o godot.zip "${base}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -o godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot

      - name: Import assets
        run: |
          "$HOME/godot/godot" --headless --path . --import || true

      - name: Static audit + test suite
        run: |
          GODOT="$HOME/godot/godot" ./run-tests.sh
